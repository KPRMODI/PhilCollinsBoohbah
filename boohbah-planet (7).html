<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stranded on Boohbah Planet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a1a;overflow:hidden;font-family:'VT323',monospace;color:#e0d8ff;user-select:none;}
#gameCanvas{display:block;position:absolute;top:0;left:0;}

/* ── HUD ── */
#hud{position:fixed;top:10px;left:10px;z-index:100;pointer-events:none;}
.stat{font-size:21px;color:#ffe566;text-shadow:0 0 8px #ffaa00;line-height:1.75;}
.stat small{font-size:13px;color:#555;}

/* ── PANEL ── */
#panel{
  position:fixed;right:0;top:0;width:248px;height:100vh;
  background:rgba(7,3,22,0.98);border-left:2px solid #4422aa;
  z-index:100;overflow-y:auto;padding:10px 8px;
  box-shadow:-4px 0 24px rgba(80,30,255,.3);
}
#panel h2{
  font-family:'Press Start 2P',monospace;font-size:8px;color:#aa66ff;
  text-align:center;padding:8px 0 10px;border-bottom:1px solid #2a1a44;margin-bottom:10px;letter-spacing:1px;
}
.pSec{margin-bottom:14px;}
.pSec h3{
  font-family:'Press Start 2P',monospace;font-size:6px;color:#ff88cc;
  padding:4px 6px;background:rgba(255,50,150,.08);border-left:3px solid #ff44aa;margin-bottom:5px;
}
/* Each row is a hover-able item */
.pRow{
  position:relative;display:flex;align-items:center;gap:7px;
  padding:6px 7px;margin-bottom:3px;border-radius:4px;
  background:rgba(35,18,60,.8);border:1px solid #3a2266;
  font-size:15px;cursor:default;transition:border-color .12s,background .12s;
}
.pRow:hover{background:rgba(55,28,90,.95);border-color:#8866dd;}
.pRow .ico{font-size:19px;flex-shrink:0;width:22px;text-align:center;}
.pRow .inf{flex:1;min-width:0;line-height:1.25;}
.pRow .inf b{display:block;font-size:14px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pRow .inf small{font-size:11px;color:#777;}
.pRow .badge{font-size:11px;flex-shrink:0;text-align:right;color:#ffe566;padding-left:4px;}
/* States */
.pRow.s-owned  {border-color:#44ff88;background:rgba(20,50,30,.7);} .pRow.s-owned  .inf b{color:#55ffaa;}
.pRow.s-maxed  {border-color:#ffaa22;background:rgba(50,30,10,.7);} .pRow.s-maxed  .inf b{color:#ffcc55;}
.pRow.s-locked {opacity:.35;}
.pRow.s-avail  {}

/* Tooltip — shown on hover, positioned left of panel */
.tip{
  display:none;position:fixed;right:253px;
  min-width:170px;max-width:210px;
  background:rgba(12,6,32,.98);border:1px solid #7744cc;
  padding:9px 11px;border-radius:5px;
  font-size:14px;color:#ccc;line-height:1.55;
  pointer-events:none;z-index:300;
  box-shadow:-3px 3px 18px rgba(100,40,255,.4);
}
.tip b{color:#bb88ff;display:block;margin-bottom:3px;font-size:13px;}
.tip .tcost{color:#ffe566;margin-top:4px;font-size:12px;}
.pRow:hover .tip{display:block;}

/* ── MESSAGES ── */
#msgLog{position:fixed;bottom:12px;left:12px;z-index:100;pointer-events:none;}
.msg{font-size:17px;color:#88ffcc;text-shadow:0 0 6px #00ffaa;animation:fm 3s forwards;display:block;}
@keyframes fm{0%{opacity:1;transform:translateY(0)}75%{opacity:1;transform:translateY(-8px)}100%{opacity:0;transform:translateY(-20px)}}

/* ── MINIMAP ── */
#minimap{position:fixed;bottom:10px;right:258px;width:120px;height:120px;
  border:2px solid #4422aa;background:rgba(6,3,18,.9);z-index:100;}

/* ── TITLE ── */
#titleScreen{
  position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a0a3a,#050510);
  z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#titleScreen h1{font-family:'Press Start 2P',monospace;font-size:clamp(10px,2vw,17px);
  color:#ff88cc;text-shadow:0 0 20px #ff44aa;text-align:center;line-height:1.8;}
#titleScreen p{font-size:19px;color:#aaa;max-width:460px;text-align:center;line-height:1.6;}
#startBtn{font-family:'Press Start 2P',monospace;font-size:11px;padding:12px 26px;
  background:transparent;border:2px solid #ff44aa;color:#ff88cc;cursor:pointer;letter-spacing:2px;transition:all .2s;}
#startBtn:hover{background:rgba(255,68,170,.18);box-shadow:0 0 20px #ff44aa;transform:scale(1.05);}
.spin{animation:sp 5s linear infinite;display:inline-block;font-size:52px;}
@keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div class="stat">💰 <span id="sMoney">25</span></div>
  <div class="stat">⚡ <span id="sIncome">1.0</span>/s</div>
  <div class="stat">❤️ <span id="sHp">100</span> / <span id="sMaxHp">100</span></div>
  <div class="stat">🗡️ <span id="sWeapon">👊 Fists</span></div>
  <div class="stat"><small>WASD · Left-click attack · E = buy pad</small></div>
</div>

<div id="panel">
  <h2>🛸 BASE STATUS</h2>
  <div id="panelInner"></div>
</div>

<div id="msgLog"></div>
<div id="minimap"><canvas id="mmCvs" width="120" height="120"></canvas></div>

<div id="titleScreen">
  <div class="spin">🪐</div>
  <h1>STRANDED ON<br>BOOHBAH PLANET</h1>
  <p>You are <b style="color:#ff88cc">Phil Collins</b>. Your tour bus crashed here.<br>
  Walk up to glowing pads <b>inside the base</b> and press <b style="color:#ffe566">E</b> to buy.<br>
  Build your defenses. Survive the Boohbahs.</p>
  <button id="startBtn" onclick="startGame()">▶ BEGIN</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  BOOHBAH PLANET  —  Phil Collins Survival Tycoon
// ═══════════════════════════════════════════════════════════════
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
const mmc = document.getElementById('mmCvs').getContext('2d');
cvs.width=innerWidth; cvs.height=innerHeight;
window.addEventListener('resize',()=>{ cvs.width=innerWidth; cvs.height=innerHeight; });

// ─────────────────────────────────────────────────────────────
//  WORLD CONSTANTS
// ─────────────────────────────────────────────────────────────
const WW=3200, WH=3200, TILE=40;
const CX=WW/2, CY=WH/2;

// Wall thickness and corridor gap (opening width for passages)
const WT=16, GAP=66;

// ─────────────────────────────────────────────────────────────
//  BASE GEOMETRY
// ─────────────────────────────────────────────────────────────
//  True Roblox-tycoon layout:
//
//         ┌─ [TOWER 200×200] ─┐
//         │      corridor      │
//  [GEN]──┤──── [MAIN HALL] ───┤──[ARMORY]
//         │      corridor      │
//         └─ [STORAGE 200×180]─┘
//
//  • Player STARTS inside Main Hall (south end).
//  • All upgrade pads are INSIDE the rooms.
//  • Room-unlock pads sit near each wall of Main Hall
//    (they open the corridor + wing when purchased).
//  • No pad is ever outside the base structure.

const MAIN = { x:CX-160, y:CY-160, w:320, h:320 };

// Wing rooms — interior rect (floor area, walls wrap it)
const WING = {
  gen:    { x:CX-160-200-80, y:CY-90,              w:200, h:180 },
  armory: { x:CX+160+80,     y:CY-90,              w:200, h:180 },
  tower:  { x:CX-100,        y:CY-160-200-80,      w:200, h:200 },
  store:  { x:CX-100,        y:CY+160+80,          w:200, h:180 },
};

// Corridors are implicit — they're the rectangular space between MAIN edge and WING edge.
// We don't draw separate corridor objects; we just cut aligned gaps in both MAIN and WING walls.
// corridor passage Y centre for left/right wings = CY (they're centred on CY)
// corridor passage X centre for top/bot wings   = CX

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let running=false, money=999999, income=1, incAcc=0, lastT=0, beaconT=0;
let camX=0, camY=0;
let walls=[], doors=[], enemies=[], pfx=[];

const OPEN = { gen:false, armory:false, tower:false, store:false };

// ─────────────────────────────────────────────────────────────
//  PLAYER
// ─────────────────────────────────────────────────────────────
const P = { x:0, y:0, w:28, h:28, speed:160, hp:100, maxHp:100 };

// ─────────────────────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────────────────────
const K={};
document.addEventListener('keydown', e=>{ K[e.key]=true; });
document.addEventListener('keyup',   e=>{ K[e.key]=false; });
const mouse={x:0,y:0};
document.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
document.addEventListener('mousedown', e=>{ if(e.button===0) doSwing(); });

// ─────────────────────────────────────────────────────────────
//  WEAPON
// ─────────────────────────────────────────────────────────────
const WPN = {
  dmg:20, range:70, cd:0.45, t:0,
  swT:0, swDur:0.18, swA:0, sw:false,
  names:['👊 Fists','🥁 Drumstick','🎤 Mic Stand','🥁 Golden Kit']
};

// ─────────────────────────────────────────────────────────────
//  UPGRADE DEFINITIONS  (single source of truth)
// ─────────────────────────────────────────────────────────────
//  type:'income'  — one-time purchase, adds incVal/s permanently
//  type:'onetime' — one-time purchase, unique effect
//  type:'room'    — unlocks a wing; pad lives inside MAIN near that wall
//  type:'multi'   — repeatable up to .max times; pad stays until maxed
//
//  pos: {x,y}  — world position of the in-game pad (set in makePads)

const UPG = {
  // ── Income pads — spread across MAIN HALL floor ──────────
  inc_scrap:    { label:'Scrap Pile',     icon:'🪨', type:'income', cost:20,   incVal:2,   desc:'Salvaged scrap metal trickles in cash.', bought:false },
  inc_moss:     { label:'Alien Moss',     icon:'🌿', type:'income', cost:50,   incVal:4,   desc:'Bioluminescent moss somehow makes money.', bought:false },
  inc_crystal:  { label:'Crystal Vein',   icon:'💎', type:'income', cost:120,  incVal:8,   desc:'Rare alien crystals are very valuable off-world.', bought:false },
  inc_nest:     { label:'Boohbah Nest',   icon:'🪺', type:'income', cost:250,  incVal:15,  desc:'They pay you not to hatch the eggs.', bought:false },
  inc_star:     { label:'Star Fragment',  icon:'⭐', type:'income', cost:600,  incVal:30,  desc:'Sell chips of fallen star material.', bought:false },
  inc_plasma:   { label:'Plasma Core',    icon:'🔵', type:'income', cost:1400, incVal:60,  desc:'Unstable plasma powers the whole income grid.', bought:false },
  inc_royalties:{ label:'Phil Royalties', icon:'🎵', type:'income', cost:3000, incVal:100, desc:'"In the Air Tonight" royalties. They never stop.', bought:false },

  // ── Room unlock pads — near each MAIN HALL wall ──────────
  room_gen:    { label:'Open Generator Rm', icon:'⚡', type:'room', cost:150, roomKey:'gen',    desc:'Breaks open the left wall. Unlocks the Generator Room wing with upgrade pads inside.', bought:false },
  room_armory: { label:'Open Armory',       icon:'🔫', type:'room', cost:200, roomKey:'armory', desc:'Breaks open the right wall. Unlocks the Armory wing with the Defense Turret inside.', bought:false },
  room_tower:  { label:'Open Watch Tower',  icon:'🗼', type:'room', cost:350, roomKey:'tower',  desc:'Breaks open the top wall. Unlocks the Watch Tower wing above.', bought:false },
  room_store:  { label:'Open Storage Rm',   icon:'📦', type:'room', cost:300, roomKey:'store',  desc:'Breaks open the bottom wall. Unlocks the Storage Room wing below.', bought:false },

  // ── Base upgrades — spread around MAIN HALL ──────────────
  door:   { label:'Base Door',      icon:'🚪', type:'onetime', cost:80,  desc:'Installs a lockable door at the south entrance. Press E near it to lock/unlock.', bought:false },
  flood:  { label:'Floodlights',    icon:'💡', type:'onetime', cost:180, desc:'Bright lights around the base. Nearby Boohbahs move 50% slower.', bought:false },
  beacon: { label:'Signal Beacon',  icon:'📡', type:'onetime', cost:350, desc:'Broadcasts a distress call. Supply drops deliver +50💰 every 30 seconds.', bought:false },
  music:  { label:'CD Player',      icon:'🎵', type:'onetime', cost:80,  desc:'Phil jams to "In the Air Tonight". Boosts movement speed permanently.', bought:false },

  // ── Multi-level — main hall + wings ──────────────────────
  suit:   { label:'Hazmat Suit',     icon:'🥼', type:'multi', cost:150, costMult:2.2, max:2, lv:0, desc:'Each level adds +25 max HP and protects Phil from spore damage.', },
  weapon: { label:'Weapon Upgrade',  icon:'⚔️',  type:'multi', cost:75,  costMult:3.0, max:3, lv:0, desc:'Fists → Drumstick → Mic Stand → Golden Kit. More damage and reach each level.', },
  walls:  { label:'Reinforce Walls', icon:'🧱', type:'multi', cost:120, costMult:2.0, max:3, lv:0, desc:'Tougher walls. Higher levels slow enemy penetration further.', },
  gen:    { label:'Generator',       icon:'⚡', type:'multi', cost:200, costMult:2.0, max:4, lv:0, desc:'Each generator level adds +5/s permanent passive income.', },
  turret: { label:'Defense Turret',  icon:'🎯', type:'multi', cost:300, costMult:2.5, max:3, lv:0, desc:'Auto-shoots nearby Boohbahs. Each level adds damage and range. Placed in the Armory.', },
};

// Pad world positions — filled in makePads()
const PAD = {}; // id -> {x,y}

// ─────────────────────────────────────────────────────────────
//  PAD PLACEMENT
// ─────────────────────────────────────────────────────────────
function makePads(){
  const M = MAIN;
  const margin = 50; // distance from room edge inward

  // ── Income pads — 3 columns across top half of main hall
  const incIds = ['inc_scrap','inc_moss','inc_crystal','inc_nest','inc_star','inc_plasma','inc_royalties'];
  const cols = 3, colW = (M.w - margin*2) / (cols-1);
  incIds.forEach((id,i)=>{
    const col = i % cols, row = Math.floor(i/cols);
    PAD[id] = { x: M.x+margin + col*colW, y: M.y+margin + row*70 };
  });

  // ── Room unlock pads — near each wall of main hall (inside, pointing at the wall)
  PAD['room_gen']    = { x: M.x + margin,      y: CY };                 // near left wall
  PAD['room_armory'] = { x: M.x+M.w - margin,  y: CY };                 // near right wall
  PAD['room_tower']  = { x: CX,                 y: M.y + margin };       // near top wall
  PAD['room_store']  = { x: CX,                 y: M.y+M.h - margin };   // near bottom wall

  // ── Base upgrade pads — corners of main hall
  PAD['door']   = { x: M.x+margin,     y: M.y+M.h - margin };
  PAD['flood']  = { x: M.x+M.w/2,     y: M.y+M.h/2 };
  PAD['beacon'] = { x: M.x+M.w-margin, y: M.y+M.h - margin };
  PAD['music']  = { x: M.x+margin,     y: M.y+M.h - margin - 70 };
  PAD['suit']   = { x: M.x+M.w-margin, y: M.y+M.h - margin - 70 };
  PAD['weapon'] = { x: M.x+M.w/2,      y: M.y+M.h - margin };
  PAD['walls']  = { x: M.x+M.w/2,      y: M.y+M.h - margin - 70 };

  // ── Wing pads — inside their respective wings
  PAD['gen']    = { x: WING.gen.x    + WING.gen.w/2,    y: WING.gen.y    + WING.gen.h/2 };
  PAD['turret'] = { x: WING.armory.x + WING.armory.w/2, y: WING.armory.y + WING.armory.h/2 };
}

// ─────────────────────────────────────────────────────────────
//  UPGRADE HELPERS
// ─────────────────────────────────────────────────────────────
function getCost(id){
  const u=UPG[id];
  if(u.type==='multi') return Math.round(u.cost * Math.pow(u.costMult, u.lv));
  return u.cost;
}
function isBuyable(id){
  const u=UPG[id];
  if(u.type==='multi') return u.lv < u.max;
  return !u.bought;
}
function isVisible(id){
  // Wing pads only visible once wing is open
  if(id==='gen')    return OPEN.gen;
  if(id==='turret') return OPEN.armory;
  return true; // everything else is always visible (in main hall)
}
function padLabel(id){
  const u=UPG[id];
  if(u.type==='multi'){
    const next = u.lv < u.max ? ` → Lv${u.lv+1}` : ' MAX';
    return u.label + next;
  }
  return u.label;
}

// ─────────────────────────────────────────────────────────────
//  BUY PAD
// ─────────────────────────────────────────────────────────────
function tryBuy(id){
  const u = UPG[id];
  if(!u || !isBuyable(id)) return;
  const cost = getCost(id);
  if(money < cost){ showMsg('💸 Need $'+cost+' for '+u.label); return; }
  money -= cost;

  if(u.type==='income'){
    u.bought=true; income+=u.incVal;
    showMsg('💰 '+u.label+' active — +'+u.incVal+'/s!');

  } else if(u.type==='onetime'){
    u.bought=true;
    if(id==='door')  { buildWalls(); showMsg('🚪 Door installed — press E near it to lock!'); }
    if(id==='flood') { showMsg('💡 Floodlights on — Boohbahs near base move slower!'); }
    if(id==='beacon'){ showMsg('📡 Beacon active! +50💰 every 30 seconds.'); }
    if(id==='music') { P.speed=220; showMsg('🎵 CD Player on — Phil moves faster!'); }

  } else if(u.type==='room'){
    u.bought=true;
    OPEN[u.roomKey]=true;
    buildWalls();
    showMsg('🏠 '+u.label+' — wing unlocked!');

  } else if(u.type==='multi'){
    u.lv++;
    if(id==='suit')  { P.maxHp+=25; P.hp=Math.min(P.hp+25,P.maxHp); }
    if(id==='weapon'){
      WPN.dmg=20+u.lv*18; WPN.range=70+u.lv*20; WPN.cd=Math.max(0.2,0.45-u.lv*0.07);
      document.getElementById('sWeapon').textContent=WPN.names[u.lv];
    }
    if(id==='gen')   { income+=5; }
    showMsg(u.icon+' '+u.label+(u.lv>=u.max?' — MAXED!':`  Lv${u.lv}/${u.max}`));
  }

  spawnPfx(PAD[id] ? PAD[id].x-camX : P.x-camX, PAD[id] ? PAD[id].y-camY : P.y-camY, '#ffe566', 18);
  document.getElementById('sIncome').textContent=income.toFixed(1);
  document.getElementById('sMaxHp').textContent=P.maxHp;
  updPanel();
}

// ─────────────────────────────────────────────────────────────
//  WALL BUILDER
// ─────────────────────────────────────────────────────────────
// Strategy: build each room as a standalone walled box, then cut
// matching aligned gaps in touching walls so corridors are open.
// A "corridor" is simply the negative space between two rooms —
// no corridor object needed if both rooms have aligned gap openings.

function buildWalls(){
  walls=[]; doors=[];

  // Push a horizontal wall segment, optionally with a centred gap
  function hw(x,y,w, gapCX){
    if(gapCX==null){ walls.push({x,y,w,h:WT}); return; }
    const g0=gapCX-GAP/2, g1=gapCX+GAP/2;
    if(g0>x)   walls.push({x,      y, w:g0-x,    h:WT});
    if(g1<x+w) walls.push({x:g1,   y, w:(x+w)-g1,h:WT});
  }
  // Push a vertical wall segment, optionally with a centred gap
  function vw(x,y,h, gapCY){
    if(gapCY==null){ walls.push({x,y,w:WT,h}); return; }
    const g0=gapCY-GAP/2, g1=gapCY+GAP/2;
    if(g0>y)   walls.push({x,y,      w:WT,h:g0-y});
    if(g1<y+h) walls.push({x,y:g1,   w:WT,h:(y+h)-g1});
  }

  // Wrap a room rect with 4 walls. gaps = { top, bot, left, right } — each null or the gap centre
  function box(r, gaps={}){
    const {x,y,w,h}=r;
    hw(x-WT, y-WT,   w+WT*2, gaps.top  ?? null);  // top
    hw(x-WT, y+h,    w+WT*2, gaps.bot  ?? null);  // bottom
    vw(x-WT, y-WT,   h+WT*2, gaps.left ?? null);  // left
    vw(x+w,  y-WT,   h+WT*2, gaps.right?? null);  // right
  }

  // ── MAIN HALL ──
  // South entrance is always open (player start), others open only if wing is open
  box(MAIN, {
    left:  OPEN.gen    ? CY   : null,
    right: OPEN.armory ? CY   : null,
    top:   OPEN.tower  ? CX   : null,
    bot:   CX,   // always open south
  });

  // Door overlay on south entrance
  if(UPG.door.bought){
    doors.push({ x:CX-GAP/2, y:MAIN.y+MAIN.h, w:GAP, h:WT, open:false });
  }

  // ── WINGS — each wing only drawn once its OPEN flag is true ──
  // Each wing has exactly ONE gap on the side facing Main Hall.
  // That gap is aligned with the Main Hall gap so the corridor is open.

  if(OPEN.gen){
    // Gen is to the LEFT. Its right wall faces main hall. Gap centred at CY.
    box(WING.gen, { right: CY });
  }
  if(OPEN.armory){
    // Armory is to the RIGHT. Its left wall faces main hall. Gap centred at CY.
    box(WING.armory, { left: CY });
  }
  if(OPEN.tower){
    // Tower is ABOVE. Its bottom wall faces main hall. Gap centred at CX.
    box(WING.tower, { bot: CX });
  }
  if(OPEN.store){
    // Storage is BELOW. Its top wall faces main hall. Gap centred at CX.
    box(WING.store, { top: CX });
  }
}

// ─────────────────────────────────────────────────────────────
//  TERRAIN
// ─────────────────────────────────────────────────────────────
const TSEED=Math.random()*9999|0;
function tileCol(tx,ty){
  const v=Math.abs(Math.sin(tx*127.1+ty*311.7+TSEED)*43758.5453%1);
  return v<.05?'#5522aa': v<.15?'#9955dd': v<.55?'#7744bb': v<.75?'#8833cc':'#6633aa';
}
const TFEATS=[];
function genTerrain(){
  for(let i=0;i<120;i++){
    const r=Math.random();
    TFEATS.push({x:Math.random()*WW,y:Math.random()*WH,
      type:r<.4?'rock':r<.7?'xtal':'egg',
      size:8+Math.random()*20, color:r<.4?'#554488':r<.7?'#cc44ff':'#ffaacc',
      angle:Math.random()*Math.PI*2});
  }
}

// ─────────────────────────────────────────────────────────────
//  COMBAT
// ─────────────────────────────────────────────────────────────
function doSwing(){
  if(!running || WPN.t>0) return;
  const pcx=P.x+P.w/2-camX, pcy=P.y+P.h/2-camY;
  const a=Math.atan2(mouse.y-pcy, mouse.x-pcx);
  WPN.swA=a; WPN.sw=true; WPN.swT=WPN.swDur; WPN.t=WPN.cd;
  const wx=P.x+P.w/2, wy=P.y+P.h/2, arc=Math.PI*.45;
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const ex=e.x+e.w/2, ey=e.y+e.h/2;
    const dx=ex-wx, dy=ey-wy, d=Math.hypot(dx,dy);
    if(d>WPN.range) continue;
    let ad=Math.atan2(dy,dx)-a;
    while(ad>Math.PI) ad-=Math.PI*2;
    while(ad<-Math.PI) ad+=Math.PI*2;
    if(Math.abs(ad)>arc) continue;
    e.hp -= WPN.dmg;
    e.x += (dx/d)*16; e.y += (dy/d)*16; e.st=.25;
    spawnPfx(ex-camX, ey-camY, e.col, 7);
    if(e.hp<=0){ money+=5+UPG.weapon.lv*2; spawnPfx(ex-camX,ey-camY,e.col,14); enemies.splice(i,1); }
  }
}

// ─────────────────────────────────────────────────────────────
//  ENEMIES
// ─────────────────────────────────────────────────────────────
let eT=0, eRate=8, eDiff=1;
const ECOLS=['#ff44aa','#ff8844','#aa44ff','#44ffaa','#ff4444'];
function spawnEnemy(){
  const s=Math.random()*4|0;
  let ex,ey;
  if(s===0){ex=Math.random()*WW;ey=0;}
  else if(s===1){ex=WW;ey=Math.random()*WH;}
  else if(s===2){ex=Math.random()*WW;ey=WH;}
  else{ex=0;ey=Math.random()*WH;}
  enemies.push({x:ex,y:ey,w:22,h:22,
    speed:40+Math.random()*30*eDiff,
    hp:30*eDiff, maxHp:30*eDiff,
    col:ECOLS[Math.random()*5|0], wob:Math.random()*6.28, st:0});
}
function updEnemies(dt){
  eT+=dt;
  if(eT>=eRate){ eT=0; spawnEnemy(); if(eRate>2) eRate-=0.08; eDiff=Math.min(eDiff+.05,5); }

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.st>0){ e.st-=dt; e.wob+=dt*3; continue; }
    e.wob+=dt*3;
    const dx=P.x-e.x, dy=P.y-e.y, d=Math.hypot(dx,dy);
    if(d>1){
      const nx=e.x+(dx/d)*e.speed*dt, ny=e.y+(dy/d)*e.speed*dt;
      let bx=false, by=false;
      for(const w of walls){
        if(aabb({x:nx,y:e.y,w:e.w,h:e.h},w)) bx=true;
        if(aabb({x:e.x,y:ny,w:e.w,h:e.h},w)) by=true;
      }
      if(!bx) e.x=nx;
      if(!by) e.y=ny;
    }
    if(aabb(e,P)){ P.hp-=8*dt; if(P.hp<0) P.hp=0; spawnPfx(P.x-camX,P.y-camY,'#ff4444',2); }

    // TURRET — shoots enemies inside armory range
    if(UPG.turret.lv>0 && OPEN.armory){
      const tx=WING.armory.x+WING.armory.w/2, ty=WING.armory.y+WING.armory.h/2;
      const tRange = 160 + UPG.turret.lv*55;
      if(Math.hypot(e.x-tx, e.y-ty) < tRange){
        e.hp -= UPG.turret.lv * 22 * dt;
        if(e.hp<=0){ money+=5; spawnPfx(e.x-camX,e.y-camY,e.col,8); enemies.splice(i,1); }
      }
    }
  }

  // Floodlight slow
  if(UPG.flood.bought){
    for(const e of enemies){
      if(Math.hypot(e.x-CX,e.y-CY)<420) e.st=Math.max(e.st,.28);
    }
  }
}

// ─────────────────────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────────────────────
function spawnPfx(sx,sy,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28, sp=50+Math.random()*80;
    pfx.push({x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:.6+Math.random()*.4, maxL:.8, col, r:2+Math.random()*3});
  }
}
function updPfx(dt){
  for(let i=pfx.length-1;i>=0;i--){
    const p=pfx[i]; p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=.88; p.vy*=.88; p.life-=dt;
    if(p.life<=0) pfx.splice(i,1);
  }
}

// ─────────────────────────────────────────────────────────────
//  PLAYER UPDATE
// ─────────────────────────────────────────────────────────────
function updPlayer(dt){
  if(WPN.t>0) WPN.t-=dt;
  if(WPN.swT>0){ WPN.swT-=dt; } else { WPN.sw=false; }

  let mx=0,my=0;
  if(K['w']||K['W']||K['ArrowUp'])    my-=1;
  if(K['s']||K['S']||K['ArrowDown'])  my+=1;
  if(K['a']||K['A']||K['ArrowLeft'])  mx-=1;
  if(K['d']||K['D']||K['ArrowRight']) mx+=1;
  const ln=Math.hypot(mx,my); if(ln>0){mx/=ln;my/=ln;}

  const nx=Math.max(0,Math.min(WW-P.w, P.x+mx*P.speed*dt));
  const ny=Math.max(0,Math.min(WH-P.h, P.y+my*P.speed*dt));
  let bx=false, by=false;
  for(const w of walls){
    if(aabb({x:nx,y:P.y,w:P.w,h:P.h},w)) bx=true;
    if(aabb({x:P.x,y:ny,w:P.w,h:P.h},w)) by=true;
  }
  for(const d of doors){
    if(d.open){
      if(aabb({x:nx,y:P.y,w:P.w,h:P.h},d)) bx=false;
      if(aabb({x:P.x,y:ny,w:P.w,h:P.h},d)) by=false;
    }
  }
  if(!bx) P.x=nx;
  if(!by) P.y=ny;

  // E key
  if(K['e']||K['E']){
    K['e']=false; K['E']=false;
    // Door toggle
    for(const d of doors){
      if(Math.hypot(d.x+d.w/2-P.x-P.w/2, d.y+d.h/2-P.y-P.h/2)<70){
        d.open=!d.open; showMsg(d.open?'🚪 Door open':'🔒 Door locked'); break;
      }
    }
    // Find nearest buyable pad within reach
    let bestId=null, bestD=9999;
    for(const id in PAD){
      if(!isBuyable(id)) continue;
      if(!isVisible(id)) continue;
      const pos=PAD[id];
      const d=Math.hypot(pos.x-P.x-P.w/2, pos.y-P.y-P.h/2);
      if(d<58 && d<bestD){ bestId=id; bestD=d; }
    }
    if(bestId) tryBuy(bestId);
  }
}

function updCam(){
  const tx=P.x+P.w/2-cvs.width/2, ty=P.y+P.h/2-cvs.height/2;
  camX+=(tx-camX)*.12; camY+=(ty-camY)*.12;
  camX=Math.max(0,Math.min(WW-cvs.width,camX));
  camY=Math.max(0,Math.min(WH-cvs.height,camY));
}

function aabb(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

function updBeacon(dt){
  if(!UPG.beacon.bought) return;
  beaconT+=dt;
  if(beaconT>=30){ beaconT=0; money+=50; showMsg('📦 Supply drop! +50💰'); }
}

// ─────────────────────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────────────────────
function drawFloor(r, col){
  ctx.fillStyle=col; ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.strokeStyle='rgba(130,65,200,0.09)'; ctx.lineWidth=1;
  for(let gx=r.x;gx<=r.x+r.w;gx+=TILE){ ctx.beginPath();ctx.moveTo(gx,r.y);ctx.lineTo(gx,r.y+r.h);ctx.stroke(); }
  for(let gy=r.y;gy<=r.y+r.h;gy+=TILE){ ctx.beginPath();ctx.moveTo(r.x,gy);ctx.lineTo(r.x+r.w,gy);ctx.stroke(); }
}
function drawGhostRoom(r){
  ctx.globalAlpha=.1; ctx.fillStyle='#7744bb'; ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.globalAlpha=.25; ctx.strokeStyle='#553366'; ctx.lineWidth=1;
  ctx.setLineDash([5,7]); ctx.strokeRect(r.x,r.y,r.w,r.h); ctx.setLineDash([]);
  ctx.globalAlpha=1;
}

function draw(){
  // Background sky
  const sg=ctx.createRadialGradient(cvs.width/2,cvs.height/2,0,cvs.width/2,cvs.height/2,cvs.width);
  sg.addColorStop(0,'#1a0a3a'); sg.addColorStop(1,'#050510');
  ctx.fillStyle=sg; ctx.fillRect(0,0,cvs.width,cvs.height);
  ctx.save(); ctx.translate(-camX,-camY);

  // Tiles
  const stx=Math.max(0,camX/TILE|0), sty=Math.max(0,camY/TILE|0);
  const etx=Math.min(WW/TILE,(camX+cvs.width)/TILE+2)|0;
  const ety=Math.min(WH/TILE,(camY+cvs.height)/TILE+2)|0;
  for(let ty=sty;ty<ety;ty++) for(let tx=stx;tx<etx;tx++){
    ctx.fillStyle=tileCol(tx,ty); ctx.fillRect(tx*TILE,ty*TILE,TILE,TILE);
  }

  // World border
  ctx.strokeStyle='#aa44ff'; ctx.lineWidth=6; ctx.strokeRect(3,3,WW-6,WH-6);

  // Terrain features
  TFEATS.forEach(f=>{
    const fx=f.x-camX;
    if(fx<-60||fx>cvs.width+60) return;
    ctx.fillStyle=f.color;
    if(f.type==='rock'){ ctx.beginPath();ctx.ellipse(f.x,f.y,f.size,f.size*.7,f.angle,0,Math.PI*2);ctx.fill(); }
    else if(f.type==='xtal'){
      ctx.save();ctx.translate(f.x,f.y);ctx.rotate(f.angle);
      ctx.beginPath();ctx.moveTo(0,-f.size);ctx.lineTo(f.size*.4,0);ctx.lineTo(0,f.size*.5);ctx.lineTo(-f.size*.4,0);ctx.closePath();ctx.fill();ctx.restore();
    } else { ctx.beginPath();ctx.ellipse(f.x,f.y,f.size*.7,f.size,0,0,Math.PI*2);ctx.fill(); }
  });

  // Draw corridor floors (the space between MAIN and each wing)
  // Corridors = the region between MAIN edge and WING edge when the wing is open
  if(OPEN.gen){
    // corridor is between WING.gen.x+WING.gen.w and MAIN.x
    const cx=WING.gen.x+WING.gen.w, cw=MAIN.x-cx, cy=CY-GAP/2, ch=GAP;
    ctx.fillStyle='#141420'; ctx.fillRect(cx,cy,cw,ch);
  }
  if(OPEN.armory){
    const cx=MAIN.x+MAIN.w, cw=WING.armory.x-cx, cy=CY-GAP/2, ch=GAP;
    ctx.fillStyle='#141420'; ctx.fillRect(cx,cy,cw,ch);
  }
  if(OPEN.tower){
    const cy=WING.tower.y+WING.tower.h, ch=MAIN.y-cy, cx=CX-GAP/2, cw=GAP;
    ctx.fillStyle='#141420'; ctx.fillRect(cx,cy,cw,ch);
  }
  if(OPEN.store){
    const cy=MAIN.y+MAIN.h, ch=WING.store.y-cy, cx=CX-GAP/2, cw=GAP;
    ctx.fillStyle='#141420'; ctx.fillRect(cx,cy,cw,ch);
  }

  // Room floors
  drawFloor(MAIN,'#1e0e30');
  if(OPEN.gen)    drawFloor(WING.gen,'#0e1a0e');
  if(OPEN.armory) drawFloor(WING.armory,'#1a0e08');
  if(OPEN.tower)  drawFloor(WING.tower,'#080e18');
  if(OPEN.store)  drawFloor(WING.store,'#10101a');

  // Ghost outlines for locked wings
  if(!OPEN.gen)    drawGhostRoom(WING.gen);
  if(!OPEN.armory) drawGhostRoom(WING.armory);
  if(!OPEN.tower)  drawGhostRoom(WING.tower);
  if(!OPEN.store)  drawGhostRoom(WING.store);

  // Room labels
  ctx.fillStyle='rgba(255,255,255,0.05)'; ctx.textAlign='center'; ctx.font='18px VT323';
  ctx.fillText('Main Hall',    MAIN.x+MAIN.w/2,       MAIN.y+20);
  if(OPEN.gen)    ctx.fillText('Generator Room', WING.gen.x+WING.gen.w/2,       WING.gen.y+20);
  if(OPEN.armory) ctx.fillText('Armory',         WING.armory.x+WING.armory.w/2, WING.armory.y+20);
  if(OPEN.tower)  ctx.fillText('Watch Tower',    WING.tower.x+WING.tower.w/2,   WING.tower.y+20);
  if(OPEN.store)  ctx.fillText('Storage Room',   WING.store.x+WING.store.w/2,   WING.store.y+20);

  // Floodlight glow
  if(UPG.flood.bought){
    const fg=ctx.createRadialGradient(CX,CY,40,CX,CY,460);
    fg.addColorStop(0,'rgba(255,255,160,0.06)'); fg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=fg; ctx.beginPath();ctx.arc(CX,CY,460,0,Math.PI*2);ctx.fill();
  }

  // Walls
  const wc=UPG.walls.lv>0?'#aa66ff':'#7744cc';
  walls.forEach(w=>{
    ctx.fillStyle=wc; ctx.fillRect(w.x,w.y,w.w,w.h);
    ctx.strokeStyle='#cc99ff'; ctx.lineWidth=1; ctx.strokeRect(w.x,w.y,w.w,w.h);
  });

  // Doors
  doors.forEach(d=>{
    ctx.fillStyle=d.open?'rgba(68,170,255,0.15)':'#152050';
    ctx.fillRect(d.x,d.y,d.w,d.h);
    ctx.strokeStyle='#44aaff'; ctx.lineWidth=2; ctx.strokeRect(d.x,d.y,d.w,d.h);
    ctx.fillStyle='#88ccff'; ctx.font='11px VT323'; ctx.textAlign='center';
    ctx.fillText(d.open?'OPEN':'[E] DOOR', d.x+d.w/2, d.y-4);
  });

  // ── TURRET VISUAL (always draws when lv>0 and armory is open)
  if(UPG.turret.lv>0 && OPEN.armory){
    const tx=WING.armory.x+WING.armory.w/2, ty=WING.armory.y+WING.armory.h/2;
    const tRange=160+UPG.turret.lv*55;
    // Range ring
    ctx.strokeStyle='rgba(255,80,60,0.15)'; ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(tx,ty,tRange,0,Math.PI*2);ctx.stroke();
    // Base platform
    ctx.fillStyle='#3a1a22';
    ctx.beginPath();ctx.arc(tx,ty,18,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#cc4444'; ctx.lineWidth=2; ctx.stroke();
    // Barrel — aims at nearest enemy
    let bAngle=Date.now()*.001; // slow spin by default
    if(enemies.length>0){
      const ne=enemies.reduce((best,e)=>{
        return Math.hypot(e.x-tx,e.y-ty)<Math.hypot(best.x-tx,best.y-ty)?e:best;
      });
      bAngle=Math.atan2(ne.y-ty,ne.x-tx);
    }
    ctx.strokeStyle='#ff6644'; ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx+Math.cos(bAngle)*26,ty+Math.sin(bAngle)*26);ctx.stroke();
    ctx.fillStyle='#882222';ctx.beginPath();ctx.arc(tx,ty,8,0,Math.PI*2);ctx.fill();
    // Level badge
    ctx.fillStyle='#ff9977'; ctx.font='bold 12px VT323'; ctx.textAlign='center';
    ctx.fillText('Turret Lv'+UPG.turret.lv, tx, ty+34);
  }

  // Beacon visual
  if(UPG.beacon.bought){
    const bx=MAIN.x+MAIN.w-50, by=MAIN.y+50;
    ctx.strokeStyle='#44ff88'; ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx,by-28);ctx.stroke();
    const pulse=(Date.now()%1500)/1500;
    ctx.strokeStyle=`rgba(68,255,136,${1-pulse})`; ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(bx,by-28,pulse*22,0,Math.PI*2);ctx.stroke();
  }

  // Generator visual
  if(UPG.gen.lv>0 && OPEN.gen){
    const gx=WING.gen.x+WING.gen.w/2, gy=WING.gen.y+WING.gen.h/2;
    ctx.fillStyle='#1a3a1a'; ctx.fillRect(gx-16,gy-16,32,32);
    ctx.font='20px serif'; ctx.textAlign='center'; ctx.fillText('⚡',gx,gy+7);
    ctx.fillStyle='#88ff88'; ctx.font='11px VT323'; ctx.fillText('Lv'+UPG.gen.lv,gx,gy+24);
  }

  // ── UPGRADE PADS
  const now=Date.now(), ppx=P.x+P.w/2, ppy=P.y+P.h/2;
  for(const id in PAD){
    if(!isBuyable(id)) continue;
    if(!isVisible(id)) continue;
    const u=UPG[id];
    if(!u) continue;
    const pos=PAD[id];
    const dist=Math.hypot(pos.x-ppx, pos.y-ppy);
    const near=dist<58;
    const aff=money>=getCost(id);
    const pulse=.6+.4*Math.sin(now/380+pos.x*.01);

    // Glow ring
    ctx.globalAlpha=pulse*.32;
    ctx.fillStyle=near?'#ffffff':aff?'#9966ff':'#441133';
    ctx.beginPath();ctx.arc(pos.x,pos.y,30,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;

    // Pad circle
    ctx.fillStyle=aff?(near?'#2a1050':'rgba(28,14,50,.95)'):'rgba(20,10,35,.95)';
    ctx.beginPath();ctx.arc(pos.x,pos.y,22,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=near?'#ffffff':(aff?'#8855cc':'#442255');
    ctx.lineWidth=near?3:1.5; ctx.stroke();

    // Icon
    ctx.font='14px serif'; ctx.textAlign='center';
    ctx.fillStyle=aff?'#fff':'#554466';
    ctx.fillText(u.icon||'?', pos.x, pos.y+5);

    // Cost
    ctx.font='bold 11px VT323'; ctx.textAlign='center';
    ctx.fillStyle=aff?'#ffe566':'#553355';
    ctx.fillText('$'+getCost(id), pos.x, pos.y+18);

    // Near prompt
    if(near){
      ctx.font='bold 14px VT323'; ctx.textAlign='center';
      ctx.fillStyle=aff?'#ffffff':'#ff5544';
      // Show name clearly
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(pos.x-70,pos.y-56,140,18);
      ctx.fillStyle=aff?'#ffffff':'#ff5544';
      ctx.fillText(aff?('[E] '+padLabel(id)):'NEED $'+getCost(id), pos.x, pos.y-43);
    }
  }

  // ── ENEMIES
  enemies.forEach(e=>{
    const wb=Math.sin(e.wob)*3;
    ctx.fillStyle=e.col; ctx.beginPath();ctx.ellipse(e.x+e.w/2,e.y+e.h/2+wb,e.w/2+2,e.h/2+2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(e.x+e.w*.3,e.y+e.h*.35+wb,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x+e.w*.7,e.y+e.h*.35+wb,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(e.x+e.w*.3,e.y+e.h*.35+wb,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x+e.w*.7,e.y+e.h*.35+wb,2,0,Math.PI*2);ctx.fill();
    if(e.hp<e.maxHp){
      ctx.fillStyle='#333';ctx.fillRect(e.x,e.y-10,e.w,5);
      ctx.fillStyle='#f44';ctx.fillRect(e.x,e.y-10,e.w*(e.hp/e.maxHp),5);
    }
  });

  // ── PLAYER (Phil Collins)
  const px=P.x,py=P.y,pw=P.w,ph=P.h;
  ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath();ctx.ellipse(px+pw/2,py+ph+3,pw/2,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=UPG.suit.lv>0?'#88ccff':'#ffe566'; ctx.fillRect(px,py,pw,ph);
  ctx.fillStyle='#886644'; ctx.fillRect(px+2,py+ph*.5,pw-4,ph*.3);
  ctx.fillStyle='#ffcc99'; ctx.fillRect(px+4,py+2,pw-8,ph*.55);
  ctx.fillStyle='#333'; ctx.fillRect(px+6,py+8,4,3); ctx.fillRect(px+pw-10,py+8,4,3);
  ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(px-14,py-20,58,14);
  ctx.fillStyle='#ffe566'; ctx.font='12px VT323'; ctx.textAlign='center';
  ctx.fillText('Phil Collins',px+pw/2,py-8);
  ctx.fillStyle='#333'; ctx.fillRect(px-2,py-28,pw+4,6);
  ctx.fillStyle=P.hp>50?'#44ff88':P.hp>25?'#ffaa22':'#f44';
  ctx.fillRect(px-2,py-28,(pw+4)*(P.hp/P.maxHp),6);

  // Swing arc
  if(WPN.sw){
    const wcx=px+pw/2,wcy=py+ph/2,a=WPN.swA,ah=Math.PI*.45,prog=1-WPN.swT/WPN.swDur;
    const wlv=UPG.weapon.lv;
    ctx.globalAlpha=(1-prog*.7)*.26;
    ctx.fillStyle=wlv>=3?'#ffd700':wlv>=2?'#88ccff':'#ffaaaa';
    ctx.beginPath();ctx.moveTo(wcx,wcy);ctx.arc(wcx,wcy,WPN.range,a-ah,a+ah);ctx.closePath();ctx.fill();
    ctx.globalAlpha=(1-prog*.7)*.8;
    ctx.strokeStyle=wlv>=3?'#ffd700':'#fff'; ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(wcx,wcy,WPN.range,a-ah,a+ah);ctx.stroke();
    ctx.strokeStyle=wlv>=2?'#aaddff':'#ffcccc'; ctx.lineWidth=wlv>=2?5:3;
    ctx.beginPath();ctx.moveTo(wcx,wcy);ctx.lineTo(wcx+Math.cos(a)*WPN.range,wcy+Math.sin(a)*WPN.range);ctx.stroke();
    ctx.globalAlpha=1;
  } else {
    const wcx=px+pw/2,wcy=py+ph/2;
    const a=Math.atan2(mouse.y-(wcy-camY),mouse.x-(wcx-camX));
    ctx.globalAlpha=.14;ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.moveTo(wcx,wcy);ctx.lineTo(wcx+Math.cos(a)*WPN.range,wcy+Math.sin(a)*WPN.range);ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  }

  // Particles
  pfx.forEach(p=>{
    ctx.globalAlpha=p.life/p.maxL; ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x+camX,p.y+camY,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
  ctx.restore();

  drawMinimap();
  document.getElementById('sMoney').textContent=Math.floor(money);
  document.getElementById('sIncome').textContent=income.toFixed(1);
  document.getElementById('sHp').textContent=Math.floor(P.hp);
}

// ─────────────────────────────────────────────────────────────
//  MINIMAP
// ─────────────────────────────────────────────────────────────
function drawMinimap(){
  mmc.clearRect(0,0,120,120);
  mmc.fillStyle='#080412'; mmc.fillRect(0,0,120,120);
  const sx=120/WW, sy=120/WH;
  const rooms=[
    {r:MAIN,  o:true},
    {r:WING.gen,    o:OPEN.gen},
    {r:WING.armory, o:OPEN.armory},
    {r:WING.tower,  o:OPEN.tower},
    {r:WING.store,  o:OPEN.store},
  ];
  rooms.forEach(({r,o})=>{
    mmc.fillStyle=o?'rgba(100,50,180,.7)':'rgba(50,25,70,.2)';
    mmc.fillRect(r.x*sx,r.y*sy,r.w*sx,r.h*sy);
  });
  // Pad dots
  for(const id in PAD){
    if(!isBuyable(id)||!isVisible(id)) continue;
    const pos=PAD[id];
    mmc.fillStyle='#aa66ff'; mmc.beginPath(); mmc.arc(pos.x*sx,pos.y*sy,2,0,Math.PI*2); mmc.fill();
  }
  mmc.fillStyle='#f44';
  enemies.forEach(e=>{ mmc.fillRect(e.x*sx-1,e.y*sy-1,3,3); });
  mmc.fillStyle='#ffe566'; mmc.fillRect(P.x*sx-2,P.y*sy-2,4,4);
}

// ─────────────────────────────────────────────────────────────
//  PANEL  (hover tooltips via CSS .tip)
// ─────────────────────────────────────────────────────────────
function updPanel(){
  const el=document.getElementById('panelInner');

  function stateClass(id){
    const u=UPG[id];
    if(u.type==='multi'){
      if(u.lv>=u.max) return 's-maxed';
      return 's-avail';
    }
    if(u.bought) return 's-owned';
    return 's-avail';
  }

  function badge(id){
    const u=UPG[id];
    if(u.type==='multi') return u.lv>=u.max?'⭐ MAX':`Lv ${u.lv}/${u.max}`;
    if(u.bought) return '✅';
    return '$'+getCost(id);
  }

  function subline(id){
    const u=UPG[id];
    if(u.type==='multi' && u.lv>=u.max) return 'Maxed out';
    if(u.bought) return 'Purchased';
    if(u.type==='income') return '+'+u.incVal+'/s · $'+u.cost;
    if(u.type==='multi')  return 'Next: $'+getCost(id);
    return '$'+u.cost;
  }

  function tipHTML(id){
    const u=UPG[id];
    const nextCost=u.type==='multi'&&u.lv<u.max?`<div class="tcost">Next upgrade: $${getCost(id)}</div>`:'';
    return `<div class="tip"><b>${u.label}</b>${u.desc}${nextCost}</div>`;
  }

  function row(id){
    const u=UPG[id];
    const sc=stateClass(id);
    return `<div class="pRow ${sc}">
      <div class="ico">${u.icon}</div>
      <div class="inf"><b>${u.label}</b><small>${subline(id)}</small></div>
      <div class="badge">${badge(id)}</div>
      ${tipHTML(id)}
    </div>`;
  }

  function sec(title, ids){
    return `<div class="pSec"><h3>${title}</h3>${ids.map(row).join('')}</div>`;
  }

  el.innerHTML =
    sec('💰 INCOME PADS',   ['inc_scrap','inc_moss','inc_crystal','inc_nest','inc_star','inc_plasma','inc_royalties']) +
    sec('🏠 UNLOCK ROOMS',  ['room_gen','room_armory','room_tower','room_store']) +
    sec('🛡️ BASE',          ['door','flood','beacon','walls']) +
    sec('👤 PHIL',          ['music','suit','weapon']) +
    sec('⚔️ DEFENSE',       ['turret','gen']);

  // Position tooltips so they don't fly to top — use JS to set top based on row position
  requestAnimationFrame(()=>{
    document.querySelectorAll('.pRow').forEach(row=>{
      const tip=row.querySelector('.tip'); if(!tip) return;
      const rect=row.getBoundingClientRect();
      tip.style.top=Math.max(4,Math.min(innerHeight-150,rect.top-10))+'px';
    });
  });
}

// ─────────────────────────────────────────────────────────────
//  MESSAGES
// ─────────────────────────────────────────────────────────────
function showMsg(t){
  const l=document.getElementById('msgLog');
  const d=document.createElement('span'); d.className='msg'; d.textContent=t;
  l.appendChild(d); setTimeout(()=>d.remove(),3200);
}

// ─────────────────────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────────────────────
function loop(ts){
  if(!running) return;
  const dt=Math.min((ts-lastT)/1000,.1); lastT=ts;
  incAcc+=income*dt;
  if(incAcc>=1){ money+=Math.floor(incAcc); incAcc%=1; }
  updPlayer(dt); updCam(); updEnemies(dt); updPfx(dt); updBeacon(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('titleScreen').style.display='none';
  running=true; lastT=performance.now();
  genTerrain();
  makePads();
  buildWalls();
  // Place player just below the Main Hall south entrance
  P.x=CX-P.w/2;
  P.y=MAIN.y+MAIN.h+WT+30;
  updPanel();
  showMsg('🪐 Stranded on Boohbah Planet!');
  showMsg('🟣 Enter the base — press E on glowing pads!');
  requestAnimationFrame(loop);
}
</script>
